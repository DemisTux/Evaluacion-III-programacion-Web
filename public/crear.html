<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Vehículo JDM</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Ingresar Nuevo Vehículo</h1>
        <a href="/" class="btn">Volver al Inventario</a>

        <form id="formVehiculo" novalidate>
            <div class="form-group">
                <label for="marca">Marca:</label>
                <input type="text" id="marca" name="marca" placeholder="Ej. Honda">
                <span id="errorMarca" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" id="modelo" name="modelo" placeholder="Ej. Civic EG8">
                <span id="errorModelo" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="ano">Año de Fabricación:</label>
                <input type="number" id="ano" name="ano" placeholder="Ej. 1994">
                <span id="errorAno" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="text" id="matricula" name="matricula" placeholder="Ej. BBCC12">
                <span id="errorMatricula" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="confirmarMatricula">Confirmar Matrícula:</label>
                <input type="text" id="confirmarMatricula" placeholder="Repita la matrícula">
                <span id="errorConfirmar" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="motor">Motor:</label>
                <input type="text" id="motor" name="motor" placeholder="Ej. D15B">
                <span id="errorMotor" class="error-msg"></span>
            </div>

            <div class="form-group">
                <label for="precio">Precio:</label>
                <input type="number" id="precio" name="precio" placeholder="Ej. 3500000">
                <span id="errorPrecio" class="error-msg"></span>
            </div>

            <button type="submit" class="btn">Guardar Vehículo</button>
        </form>
    </div>

    <script src="/js/app-frontend.js"></script>
</body>
</html>
